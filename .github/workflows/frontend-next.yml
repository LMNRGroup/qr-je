name: frontend-next

on:
  push:
    branches: [main]
    paths:
      - 'frontend-next/**'
      - '.github/workflows/frontend-next.yml'
  pull_request:
    paths:
      - 'frontend-next/**'
      - '.github/workflows/frontend-next.yml'

defaults:
  run:
    working-directory: frontend-next

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      # Placeholder values so the production build/start passes env validation.
      # Real Supabase credentials are injected by the deploy platform, not CI.
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:8123
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend-next/.nvmrc
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm run smoke
